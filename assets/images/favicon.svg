<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#050510"/>

  <!-- Neural connection lines -->
  <line x1="8" y1="10" x2="16" y2="16" stroke="#00ffd1" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="10" x2="16" y2="16" stroke="#b066ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="8" y1="23" x2="16" y2="16" stroke="#b066ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="23" x2="16" y2="16" stroke="#00ffd1" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="5"  x2="16" y2="16" stroke="#00ffd1" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="27" x2="16" y2="16" stroke="#00ffd1" stroke-width="0.8" opacity="0.5"/>

  <!-- Outer nodes -->
  <circle cx="16" cy="5"  r="1.8" fill="#00ffd1"/>
  <circle cx="8"  cy="10" r="1.6" fill="#00ffd1" opacity="0.8"/>
  <circle cx="24" cy="10" r="1.6" fill="#b066ff" opacity="0.8"/>
  <circle cx="8"  cy="23" r="1.6" fill="#b066ff" opacity="0.8"/>
  <circle cx="24" cy="23" r="1.6" fill="#00ffd1" opacity="0.8"/>
  <circle cx="16" cy="27" r="1.8" fill="#00ffd1"/>

  <!-- Center core with glow -->
  <circle cx="16" cy="16" r="4.5" fill="#050510" stroke="#00ffd1" stroke-width="1"/>
  <circle cx="16" cy="16" r="2.5" fill="#00ffd1"/>
</svg>
